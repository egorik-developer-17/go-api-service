name: ci 

on: 
  push:
    branches: [main, feature/add-price-category]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read


    steps: 
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'


      - name: Show Go version
        run: go version

      - name: Run tests
        run: go test./...
      
      - name: Build app
        run: go build./...

      - name: Build Docker Image
        run: docker build -t go-api-service:ci .