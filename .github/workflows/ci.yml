name: ci-cd

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

on:
  push:
    branches:
      - main
      - feature/add-price-category
      - feature/split-ci-workflow
      - fix/hadler-validation-and-tests
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Run linter
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'

      - name: Show Go version
        run: go version

      - name: Download dependencies
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run go vet
        run: go vet ./...

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: lint

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'

      - name: Show Go version
        run: go version

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Show coverage summary
        run: go tool cover -func=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  build:
    name: Build application
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'

      - name: Build Go application
        run: go build ./...

      - name: Build binary artifact
        run: |
          mkdir -p bin
          go build -o bin/api ./cmd/api

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-binary
          path: bin/api

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t go-api-service:ci .

      - name: Run Docker container
        run: |
          docker run -d --name go-api-service-ci -p 8080:8080 go-api-service:ci
          sleep 5

      - name: Check health endpoint
        run: curl --fail http://localhost:8080/health

      - name: Show container logs on failure
        if: failure()
        run: docker logs go-api-service-ci

      - name: Stop Docker container
        if: always()
        run: docker rm -f go-api-service-ci

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Tag Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag go-api-service:ci ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker tag go-api-service:ci ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy_test:
    name: Deploy to test VPS
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: test

    concurrency:
      group: deploy-test
      cancel-in-progress: false

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create release archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='bin' \
            --exclude='.env' \
            -czf /tmp/go-api-service-release.tar.gz .

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat > ~/.ssh/deploy_key <<'EOF'
          ${{ secrets.VPS_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" -H "${{ secrets.VPS_HOST }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=yes \
            -i ~/.ssh/deploy_key \
            -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "echo SSH connection successful"

      - name: Upload release archive to VPS
        run: |
          scp -i ~/.ssh/deploy_key -P "${{ secrets.VPS_PORT }}" \
            /tmp/go-api-service-release.tar.gz \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/go-api-service-release.tar.gz"

      - name: Login to GHCR on VPS
        run: |
          printf '%s\n' "${{ secrets.GHCR_TOKEN }}" | ssh -i ~/.ssh/deploy_key -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "docker login ghcr.io -u '${{ secrets.GHCR_USERNAME }}' --password-stdin"

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "set -e && \
            mkdir -p /opt/go-api-service && \
            find /opt/go-api-service -mindepth 1 -maxdepth 1 ! -name '.env' -exec rm -rf {} + && \
            tar -xzf /tmp/go-api-service-release.tar.gz -C /opt/go-api-service && \
            cd /opt/go-api-service && \
            IMAGE_TAG=${{ github.sha }} docker compose pull && \
            IMAGE_TAG=${{ github.sha }} docker compose up -d --remove-orphans && \
            sleep 5 && \
            curl --fail http://localhost:8080/health"