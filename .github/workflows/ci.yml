name: ci-cd 

on: 
  push:  
    branches: [main, feature/add-price-category]
  pull_request: 
    branches: [main]

jobs: 
  test:
    name: Run tests
    runs-on: ubuntu-latest # жоба будет запускаться на linux runner от github

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup-Go
        uses: actions/setup-go@v6 
        with:
          go-version: '1.26.1'

      - name: Show go version
        run: go version

      - name: Download dependencies
        run: go mod download
      - name: Run tests
        run: go test ./...