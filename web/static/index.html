<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог сельхоз продукции</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="app">
    <header class="page-header">
      <div>
        <p class="eyebrow">Agro Catalog API</p>
        <h1>Каталог сельхоз продукции</h1>
        <p class="page-description">
          Интерфейс для просмотра, добавления, обновления и удаления товаров.
        </p>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>Добавить товар</h2>

        <form id="product-form" class="product-form"> <!-- Открываем форму для создания товара. -->
  <label for="product-name" class="label">Название товара</label> <!-- Подпись для поля названия. -->
  <input id="product-name" name="name" type="text" class="input" placeholder="Например: Ячмень" autocomplete="off"> <!-- Поле ввода названия товара. -->

  <label for="product-category" class="label">Категория</label> <!-- Подпись для поля категории. -->
  <input id="product-category" name="category" type="text" class="input" placeholder="Например: зерновые" autocomplete="off"> <!-- Поле ввода категории товара. -->

  <label for="product-price" class="label">Цена</label> <!-- Подпись для поля цены. -->
  <input id="product-price" name="price" type="number" step="0.01" min="0.01" class="input" placeholder="Например: 1200.50"> <!-- Поле ввода цены. step позволяет вводить дробные числа. -->

  <p id="form-error" class="form-error hidden"></p> <!-- Блок для вывода ошибок формы. -->

  <button type="submit" class="button button-primary">Добавить товар</button> <!-- Кнопка отправки формы. -->
</form>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>Список товаров</h2>
            <p class="panel-description">Данные загружаются из Go API.</p>
          </div>

          <button id="reload-button" type="button" class="button button-secondary">
            Обновить список
          </button>
        </div>

        <div id="message" class="message hidden"></div>

        <div id="empty-state" class="empty-state hidden">
          Каталог пока пуст. Добавь первый товар через форму слева.
        </div>

        <div id="table-container" class="table-wrapper">
          <table class="products-table">
            <thead> <!-- Открываем шапку таблицы. -->
  <tr> <!-- Начинаем строку шапки. -->
    <th>ID</th> <!-- Колонка идентификатора товара. -->
    <th>Название</th> <!-- Колонка названия товара. -->
    <th>Категория</th> <!-- Новая колонка категории. -->
    <th>Цена</th> <!-- Новая колонка цены. -->
    <th>Действия</th> <!-- Колонка кнопок действий. -->
  </tr> <!-- Закрываем строку шапки. -->
</thead> <!-- Закрываем шапку таблицы. -->

            
            <tbody id="products-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="/static/js/app.js" defer></script>
</body>
</html>
